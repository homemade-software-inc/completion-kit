<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<style>
  body { margin: 0; }
  .card {
    width: 1200px;
    height: 630px;
    background: linear-gradient(135deg, #06b6d4 0%, #0891b2 100%);
    color: white;
    font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
    padding: 80px;
    box-sizing: border-box;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }
  .card .top { display: flex; align-items: center; gap: 24px; }
  .card .top img { width: 96px; height: 96px; }
  .card .top h1 { margin: 0; font-size: 56px; letter-spacing: -1px; }
  .card .tagline { font-size: 44px; line-height: 1.2; font-weight: 600; max-width: 1000px; }
  .card .footer { font-size: 24px; opacity: 0.85; }
</style>
</head>
<body>
<div class="card">
  <div class="top">
    <img src="../docs/logo.png" alt="" />
    <h1>CompletionKit</h1>
  </div>
  <div class="tagline">Prompt testing across OpenAI, Anthropic, Ollama, and any model OpenRouter supports.</div>
  <div class="footer">completionkit.com &middot; free, MIT-licensed</div>
</div>
</body>
</html>
