<!DOCTYPE html>
<html>
<head>
  <title>500 — CompletionKit</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap');
    *, *::before, *::after { box-sizing: border-box; }
    html { font-size: 18px; line-height: 1.5; -webkit-font-smoothing: antialiased; }
    body {
      margin: 0; min-height: 100vh; display: flex; flex-direction: column;
      background: #080b14; color: #e2e8f0;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    header {
      background: #111827; border-bottom: 1px solid #1e293b;
      padding: 0.75rem 1.5rem;
    }
    .brand {
      font-family: 'JetBrains Mono', monospace; font-weight: 700;
      font-size: 0.95rem; color: #e2e8f0; text-decoration: none;
    }
    main {
      flex: 1; display: flex; align-items: center; justify-content: center;
      padding: 2rem;
    }
    .error-card {
      background: #111827; border: 1px solid #1e293b; border-radius: 10px;
      padding: 3rem; max-width: 480px; width: 100%; text-align: center;
    }
    .error-code {
      font-family: 'JetBrains Mono', monospace; font-size: 3.5rem;
      font-weight: 700; color: #ef4444; margin: 0 0 0.25rem;
    }
    .error-title {
      font-size: 1.25rem; font-weight: 600; margin: 0 0 0.75rem; color: #e2e8f0;
    }
    .error-message {
      color: #64748b; font-size: 0.9rem; margin: 0 0 1.5rem;
    }
    .error-link {
      display: inline-block; padding: 0.5rem 1.25rem;
      background: rgba(6, 182, 212, 0.1); border: 1px solid #06b6d4;
      border-radius: 6px; color: #06b6d4; text-decoration: none;
      font-size: 0.85rem; font-weight: 500; transition: background 0.15s;
    }
    .error-link:hover { background: rgba(6, 182, 212, 0.2); }
  </style>
</head>
<body>
  <header><a href="/" class="brand">CompletionKit</a></header>
  <main>
    <div class="error-card">
      <p class="error-code">500</p>
      <h1 class="error-title">Something went wrong</h1>
      <p class="error-message">An unexpected error occurred. If this keeps happening, check your server logs for details.</p>
      <a href="/" class="error-link">Back to home</a>
    </div>
  </main>
</body>
</html>
